<cae-card class="forge-galleria-card">
  <h3 class="forge-galleria-card__title">Image gallery</h3>
  <p class="forge-galleria-card__lead">
    A main image with a thumbnail strip and a fullscreen lightbox. Pick a thumbnail, arrow through
    the strip, or open the lightbox — the two-way <code>[(activeIndex)]</code> keeps this readout
    live, including navigation done inside the fullscreen view.
  </p>

  <cae-galleria
    class="forge-galleria"
    [items]="images"
    ariaLabel="Star plates"
    [(activeIndex)]="index"
  />

  <p class="forge-galleria__note">
    Viewing: <code>{{ currentAlt() }}</code>
  </p>
</cae-card>
