# CI — Caelum
# These jobs encode the definition_of_done gates that run in CI. All are real
# (configured by issue #6, from PROJECT_CONVENTIONS.md > Build & Test): `static
# gates` is the node-free honesty layer; `build & test` builds the library
# (+ US-origin attestation + size gate) and Forge (budgets) then runs the Vitest
# suite; `format & lint` runs Prettier + the adapter-isolation ESLint fence.
# The commands here mirror scripts/preflight.{sh,ps1} by construction — change one,
# change the others.
#
# ── CI posture — minutes-aware pacing (docs/AUTOMATION.md §6) ────────────────
# Private repos draw Actions minutes from the plan's monthly pool (Free 2,000 /
# Pro 3,000; Windows bills ~1.7× Linux) — an autopilot loop running everything on
# every push empties that in days. Two repo variables tune CI independently:
#
#   gh variable set CI_POSTURE --body <light|full|manual>      (unset = light)
#   gh variable set CI_GATING  --body <blocking|advisory>      (unset = blocking)
#
# CI_POSTURE — how MUCH runs:
#   light  (default) — only `static gates` runs, per PR (~1 min: library/research
#          audits, skills structure, TODO hygiene). The heavy matrix runs on demand.
#   full   — the heavy build/test/lint matrix too. For public repos (minutes free),
#          paid pools, or a self-hosted runner.
#   manual — nothing automatic; escalation paths only. A clean local preflight
#          pasted into the PR is the merge gate.
#
# CI_GATING — WHEN the heavy matrix runs (only meaningful in `full`; in `light` the
# matrix is already on-demand):
#   blocking (default) — heavy runs ON THE PR and must be green to merge.
#   advisory — heavy does NOT run on PRs; it runs POST-MERGE on the main push as a
#          sanity check. The PR merges on `static gates` + the local preflight (which
#          runs the SAME heavy gates locally — so this defers re-running already-passed
#          tests, it does not skip testing). A red post-merge run is caught by the next
#          onboard, which files a `bug` and fixes forward — cheap, because preflight
#          already covered the heavy gates, so a post-merge red is the rare
#          environment-specific case. Require only `static gates` in branch protection.
#
# PATH MODULARITY (always on): a doc-only change — every changed file is *.md, or
# under docs/ or _intake/ — never triggers the heavy matrix, in any posture. This is
# the "15 minutes of full CI just to edit the roadmap" tax, gone. The `changes` job
# classifies; the heavy jobs gate on its output. (`static gates` still runs on docs —
# it checks links, citations, SECTIONS freshness, and hygiene.)
#
# Escalation in ANY posture: label a PR `full-ci` (heavy matrix for that PR, even on
# docs) · `gh workflow run ci.yml` (one full run) · push an `M*`/`v*` milestone tag.
#
# Gating is job-level `if:` ON PURPOSE: a job skipped by its conditional reports
# "Success" and SATISFIES required status checks, while workflow-level path/branch
# filters leave required checks "Pending" and block the PR forever. Don't "simplify"
# these into `on:` filters. Require only the checks a given posture actually runs
# (light/advisory → `static gates`; docs/AUTOMATION.md §5–6).
#
# scripts/preflight.{sh,ps1} always runs EVERY gate locally regardless of posture
# — pacing changes when CI re-verifies, never what must pass. Keep the commands
# here mirrored with preflight (change one → change the other).
name: CI

# PRs carry the merge gate; the push trigger is restricted to main (post-merge
# verification — full posture, and the advisory sanity run) and milestone tags
# (always the full matrix). `labeled` is in the PR types so adding `full-ci`
# re-triggers the run; `workflow_dispatch` is the on-demand full run.
on:
  push:
    branches: [main]
    tags: ['M*', 'v*']
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Rapid pushes to the same ref cancel the superseded run. event_name is in the
# key so a dispatched full run isn't cancelled by an unrelated push run.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path classifier for modularity: is any non-doc file in this change? Its output
  # gates the heavy matrix so doc-only changes skip it. Cheap (~10s). It runs only
  # when the heavy matrix could need it (full posture, or an explicit escalation) —
  # so in light/manual it's skipped too. That guarantee matters: every condition that
  # can make a heavy job's `if:` true also makes this job's `if:` true, so the heavy
  # jobs' `needs: changes` never resolves to a skipped dependency.
  changes:
    name: classify changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      vars.CI_POSTURE == 'full' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.classify.outputs.code }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: classify
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          # Hand-rolled (no third-party action) and FAIL-SAFE: code starts true, so
          # any error or empty signal runs the matrix rather than skipping it on a
          # bad read. code=false only when a non-empty file list is wholly doc-only.
          set +e
          case "$REF" in refs/tags/*) echo "code=true" >> "$GITHUB_OUTPUT"; echo "tag -> code=true"; exit 0 ;; esac
          if [ "$EVENT" = "workflow_dispatch" ]; then echo "code=true" >> "$GITHUB_OUTPUT"; echo "dispatch -> code=true"; exit 0; fi
          if [ "$EVENT" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --quiet
            range="origin/$BASE_REF...HEAD"
          else
            case "$BEFORE" in ""|0000000000000000000000000000000000000000) range="HEAD^...HEAD" ;; *) range="$BEFORE...HEAD" ;; esac
          fi
          changed=$(git diff --name-only $range 2>/dev/null)
          [ -z "$changed" ] && changed=$(git diff --name-only HEAD^...HEAD 2>/dev/null)
          echo "changed files:"; echo "$changed"
          # ERE, not PCRE (-P dies on non-UTF-8 locales). A line surviving both
          # inverted greps is a non-blank, non-doc path -> real code changed.
          code=true
          if [ -n "$changed" ]; then
            noncode=$(echo "$changed" | grep -vE '^$' | grep -vE '(\.md$|^docs/|^_intake/)')
            [ -z "$noncode" ] && code=false
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "doc-only change? -> code=$code (false = heavy matrix skipped)"

  # The always-real, always-cheap merge gate. ONE consolidated job on purpose:
  # split into four jobs, the same ~90s of work bills four runners' checkout +
  # setup time. Runs per PR in light+full; on main pushes only in full;
  # always on dispatch / tags / a `full-ci` label. Stays BLOCKING even under
  # advisory gating — it is the fast honesty layer; only the heavy matrix defers.
  static-gates:
    name: static gates
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'full-ci')) ||
      (vars.CI_POSTURE != 'manual' &&
       (github.event_name == 'pull_request' || vars.CI_POSTURE == 'full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # the hygiene step diffs against the PR base
      - uses: actions/setup-python@v6
        with: { python-version: "3.x" }

      # Keeps the knowledge library honest on every run. The audit scripts exit
      # non-zero on any unresolved citation / failed routing case / broken link,
      # so this step genuinely blocks merge — it is not decorative.
      - name: Library audits (refs / routing / links)
        working-directory: textbooks
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: |
          python3 tools/_gen_sections.py
          # The COMMITTED index is what agents grep to verify citations — a heading
          # edit merged without regenerating it would poison every later lookup.
          git diff --exit-code -- SECTIONS.json || { echo "::error::SECTIONS.json is stale — run tools/_gen_sections.py and commit the result."; exit 1; }
          python3 tools/_audit_refs.py
          python3 tools/_audit_routing.py
          python3 tools/_audit_links.py

      # Keeps the frontier research layer honest: MANIFEST routing complete,
      # every tiered claim carries a real URL + accessed date, reports have
      # their required sections, every figure/relative link resolves.
      # (URL liveness is NOT checked here — run `--live` locally; the web is
      # too flaky to gate merges on.)
      - name: Research audit (citations / structure / links)
        working-directory: research
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: python3 tools/_audit_research.py

      # Dependency-provenance gate (issue #4, D-11) — the M0-2 scan automated. It
      # reads the committed package-lock.json + provenance/allowlist.json (no
      # node_modules), so it belongs in this node-free job and is BLOCKING from day
      # one. A new runtime dep absent from the allowlist, a non-permissive license,
      # or a non-US/non-allied origin fails the merge — the "Provenance purity"
      # invariant (docs/ARCHITECTURE.md §2, R5). Mirrored by preflight's provenance stage.
      - name: Dependency provenance (license + US-origin, D-11)
        run: python3 scripts/check_provenance.py

      # Theming invariant (D-04, guard #498): no hardcoded design values in component
      # sources — every color/space/radius/type from --cae-* tokens; documented
      # exceptions carry an in-file `token-exempt:` marker. Added after the
      # file-upload escape (#496). Mirrored by preflight's `theming scan` stage.
      - name: Theming scan (D-04 token-only)
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: python3 scripts/check_theming.py

      # Doc-drift budgets (#67): the docs are state caches of the tracker; this caps
      # Status/ARCHITECTURE/ROADMAP growth so session journaling cannot creep in.
      # Mirrored by the `doc budgets` stage in scripts/preflight.{sh,ps1}.
      - name: Doc budgets (anti-drift)
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: python3 scripts/audit_docs.py

      # Ops-config integrity (#71): the preflight.sh <-> preflight.ps1 <-> ci.yml
      # three-way mirror and the settings/hook wiring must not rot; the canonical
      # stage<->step map lives in the script — a gate added to one file goes red
      # until all three (and the map) agree. Mirrored by the `ops-config audit` stage.
      - name: Ops-config audit (preflight/CI mirror, settings sanity)
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: python3 scripts/audit_ops_config.py

      # Repo-docs link audit (#73): the relative links agents navigate every session
      # (root docs, docs/, .claude skills->agents/docs, _intake) were checked by
      # nothing; textbooks/ and research/ own their own link audits. Mirrored by the
      # `repo-docs links` stage in scripts/preflight.{sh,ps1}.
      - name: Repo-docs link audit (root/docs/.claude/_intake)
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: python3 scripts/audit_repo_links.py

      # Content-drift staleness (#222): claim-heavy docs (research notes +
      # ARCHITECTURE) whose referenced files changed after the doc's last commit
      # — the drift the link audits (existence) and note aging (time) can't see.
      # WARN-ONLY: always exits 0; promotion to a failing gate is a retrospective
      # call. Real dates need history — this job's checkout is fetch-depth: 0;
      # on a shallow clone the script SKIPs loudly instead of guessing.
      # Mirrored by the `staleness audit (warn-only)` stage in scripts/preflight.{sh,ps1}.
      - name: Staleness audit (content drift, warn-only)
        env: { PYTHONIOENCODING: utf-8, PYTHONUTF8: "1" }
        run: python3 scripts/audit_staleness.py

      # Skills load ONLY as .claude/skills/<name>/SKILL.md directories — a flat
      # .md file in skills/ silently fails to load (the layer becomes inert docs).
      - name: Skills are directories
        run: |
          flat=$(find .claude/skills -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null || true)
          if [ -n "$flat" ]; then
            echo "$flat"
            echo "::error::Flat skill file(s) under .claude/skills/ — Agent Skills load only from <name>/SKILL.md directories. git mv each to <name>/SKILL.md."
            exit 1
          fi
          echo "Skills structure OK."

      # Tracker hygiene: added code must not contain a naked TODO/FIXME — every
      # deferral carries a filed ticket, written as TODO(#NN). Docs (*.md),
      # .github/, textbooks/ and .claude/ are exempt (they *talk about* TODOs —
      # .claude holds the very hook that enforces this rule and the settings
      # $comment that documents it; its only non-doc files are that machinery).
      # scripts/preflight.{sh,ps1} stay exempt PERMANENTLY (not just as templates):
      # they IMPLEMENT the mirrored `todo hygiene` stage, so the literal words
      # todo/fixme live in them by necessity — scanning their own diff would
      # false-positive on the very gate they run (#6 kept these two on purpose).
      # The sed strips ticketed TODO(#NN)/FIXME(#NN) forms first, so EVERY
      # remaining occurrence is naked — a `(#NN)` elsewhere on the line no
      # longer whitewashes one. (sed+grep, not grep -P: PCRE dies on
      # non-UTF-8 locales, e.g. git-bash on Windows.)
      # Mirrored by the `todo hygiene` stage in scripts/preflight.{sh,ps1}.
      - name: No naked TODO/FIXME in added lines
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --quiet
          naked=$(git diff "origin/${{ github.base_ref }}...HEAD" -- . ':!*.md' ':!.github' ':!textbooks' \
            ':!scripts/preflight.sh' ':!scripts/preflight.ps1' ':!.claude' ':!scripts/audit_ops_config.py' \
            | grep -E '^\+' | grep -vE '^\+\+\+' \
            | sed -E 's/(todo|fixme)\(#[0-9]+\)//gI' | grep -iE '\b(todo|fixme)\b' || true)
          if [ -n "$naked" ]; then
            echo "$naked"
            echo "::error::Naked TODO/FIXME in the diff — file a ticket first and annotate as TODO(#NN). See PROJECT_CONVENTIONS.md, Tracker & Hygiene."
            exit 1
          fi
          echo "No naked TODOs."

      # Commit-message semantics (#591): GitHub's closing-keyword parser has no
      # notion of negation, so "Filed, not fixed: #580" CLOSES #580 — which is
      # how #580 sat closed-as-completed with the bug live on main (710a0a7).
      # Mirrored by the `commit-msg semantics` stage in scripts/preflight.{sh,ps1}.
      # The PR title/body are scanned here too (GitHub honours the keywords in
      # both) and flow through env vars, never interpolated — untrusted input.
      - name: Commit-message semantics
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git fetch origin "${{ github.base_ref || 'main' }}" --quiet || true
          python3 scripts/check_commit_msgs.py "origin/${{ github.base_ref || 'main' }}..HEAD"

      # Ticket-first enforcement (#75, PROJECT_CONVENTIONS.md > Tracker & Hygiene):
      # a PR's title OR body must carry a #NN issue reference ("closes #NN", "refs
      # #NN", "Addresses #NN", "Provisional on #NN" all qualify). The `no-ticket`
      # label skips it (rare, and itself review surface). PR-only BY NATURE:
      # preflight runs pre-PR, so there is nothing to mirror — audit_ops_config
      # lists it in CI_ONLY_STEPS. Title/body flow through env vars, never
      # interpolated into the script (untrusted input).
      - name: PR references a ticket
        if: >-
          github.event_name == 'pull_request' &&
          !contains(github.event.pull_request.labels.*.name, 'no-ticket')
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s %s' "$PR_TITLE" "$PR_BODY" | grep -qE '#[0-9]+'; then
            echo "Ticket reference found."
          else
            echo "::error::PR references no issue — put a #NN reference in the title or body (closes/refs/Addresses #NN), or apply the 'no-ticket' label. See PROJECT_CONVENTIONS.md > Tracker & Hygiene."
            exit 1
          fi

  # ── Heavy jobs — full posture (blocking on PRs / advisory post-merge on main),
  #    or on demand (`full-ci` label / dispatch / tag). Skipped for doc-only changes
  #    via `needs: changes`. The `if:` reads: run when explicitly escalated, OR when
  #    real code changed AND posture is full AND (it's the main push, OR it's a PR
  #    and gating is blocking). Advisory therefore runs the matrix only post-merge.
  build-test:
    name: build & test (${{ matrix.os }})
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'full-ci')) ||
      (needs.changes.outputs.code == 'true' &&
       vars.CI_POSTURE == 'full' &&
       (github.event_name == 'push' ||
        (github.event_name == 'pull_request' && vars.CI_GATING != 'advisory')))
    strategy:
      fail-fast: false
      matrix:
        # Trim to the platforms you actually ship — Windows bills ~1.7× Linux.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Angular 22 / Node 22 toolchain. Self-contained via setup-node (distinct from
      # the dev-env Node at ~/nodejs, #15); npm cache keyed on package-lock.json.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci

      # Build the publishable library FIRST — Forge consumes it through the
      # `caelum -> ./dist/caelum` path map, so its build depends on dist/caelum.
      # `build:lib` = ng build caelum -> emit US-origin attestation -> per-entry
      # -point gzip size gate (issue #4). CI-enforcing the last two closes the #4
      # gap where they ran only in the Node-gated preflight (see #6 scope comment).
      - name: Build library (+ US-origin attestation + size gate)
        run: npm run build:lib

      # Forge in production config exercises the angular.json budgets (400/600 kB
      # initial) — the second size gate. Fails the build if the demo blows its budget.
      - name: Build Forge (production budgets)
        run: npx ng build forge

      # Unit + component tests (Vitest via @angular/build:unit-test, jsdom env — no
      # browser needed). CI=true (Actions sets it too, but we're explicit so a
      # self-hosted / non-standard runner can't drop into watch mode and hang) makes
      # the builder run once and exit. Mirrors preflight's `test` stage (CI=true there).
      - name: Test (caelum + Forge)
        env:
          CI: 'true'
        run: npx ng test

      # No headless "run loop" to smoke: Caelum ships a client-side component library
      # and Forge is a static SPA. The build (bundle emitted) + the tests passing ARE
      # the operability evidence (validate_headless_mode) — there is no daemon to probe.

  lint:
    name: format & lint
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'full-ci')) ||
      (needs.changes.outputs.code == 'true' &&
       vars.CI_POSTURE == 'full' &&
       (github.event_name == 'push' ||
        (github.event_name == 'pull_request' && vars.CI_GATING != 'advisory')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # The adapter-isolation ESLint fence (D-03, real from #4) + Prettier format
      # check both need the Node toolchain + installed deps. Self-contained via
      # setup-node (distinct from the dev-env Node at ~/nodejs, #15).
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      # Prettier over the code (TS/HTML/SCSS/config JSON); prose/generated trees are
      # scoped out via .prettierignore (they carry their own audits). Mirrored by
      # preflight's `format --check` stage.
      - name: Format check
        run: npm run format:check
      - name: Lint (adapter isolation + angular-eslint)
        run: npm run lint
      # Optional: docs build as a merge gate (doc warnings as errors) — uncomment
      # if the stack has one (rustdoc / typedoc / sphinx …); a doc-warning gate
      # catches rot the moment it lands instead of at release. Mirror the command
      # into scripts/preflight.{sh,ps1} if you enable it.
      # - name: Docs (warnings as errors)
      #   run: 'echo "SKIP (unconfigured): docs build command"'

  # Aggregation gate — a SINGLE, stable, non-matrix required check standing in for the
  # heavy matrix. WHY this exists: a matrix job SKIPPED at the job level (a doc-only PR,
  # where `changes` -> code=false) posts ONE check-run under the UNEXPANDED name
  # `build & test (${{ matrix.os }})`, NOT the per-leg `build & test (ubuntu-latest)` /
  # `(windows-latest)`. So requiring the per-leg names deadlocks every doc-only PR at
  # "Expected" (verified live on PR #34). Require `heavy matrix gate` (+ `static gates`),
  # NOT the matrix legs or `format & lint` directly.
  #
  # ── #206 (adopted from the pyxis template, replacing the pass-or-skip form): the
  # earlier `if: always()` + "build-test/lint are success-or-skipped" gate had a hole —
  # the SAME job-level skip that legitimately fires for a doc-only/posture skip ALSO
  # fires when the `changes` classifier job itself DIES (checkout/runner infra; its
  # script is fail-safe, the job is not). Every dependent then skips and the PR reads
  # green with zero heavy coverage. The fix: run whenever the heavy matrix CAN be in
  # play (the same disjunction as `changes.if` — the pair is audit-enforced, not
  # comment-enforced: audit_ops_config.py check 5 fails on drift, #213) and fail iff
  # `classify changes` ERRORED or a needed heavy job FAILED. Posture/gating/doc-only
  # skips still pass, so light/manual keep their all-skipped runs. Display name kept
  # `heavy matrix gate` so the required-check mapping stays stable across this change.
  heavy-gate:
    name: heavy matrix gate
    needs: [changes, build-test, lint]
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       startsWith(github.ref, 'refs/tags/') ||
       vars.CI_POSTURE == 'full' ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'full-ci')))
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate heavy results
        env:
          CHANGES: ${{ needs.changes.result }}
          BUILD: ${{ needs['build-test'].result }}
          LINT: ${{ needs.lint.result }}
        run: |
          echo "classify changes: $CHANGES | build & test: $BUILD | format & lint: $LINT"
          fail=0
          if [ "$CHANGES" = "failure" ]; then
            echo "::error::classify changes ERRORED — heavy jobs were skipped for the WRONG reason (infra failure, not doc-only/posture). Zero heavy coverage: re-run the workflow; do not merge on this green (#206)."
            fail=1
          fi
          if [ "$BUILD" = "failure" ]; then echo "::error::build & test failed"; fail=1; fi
          if [ "$LINT" = "failure" ]; then echo "::error::format & lint failed"; fail=1; fi
          exit $fail
