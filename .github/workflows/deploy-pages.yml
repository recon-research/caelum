# Forge demo → GitHub Pages (#495; owner-authorized 2026-07-16 survey: deploy on
# every main push, so the hosted demo always matches main).
#
# Deliberately separate from ci.yml and OUTSIDE the posture machinery: main is
# already merge-gated (branch protection + the PR matrix), so this workflow only
# builds and publishes — it never gates a PR, and CI_POSTURE/CI_GATING do not
# apply to it. The production build re-exercises the angular.json bundle budgets
# by construction (a budget error fails the deploy, never ships a bloated demo).
# SPA fallback: 404.html = index.html, so deep links land in the app.
name: Deploy Forge demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer main push supersedes an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Angular 22 / Node 22 toolchain via setup-node, mirroring ci.yml's build job.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install
        run: npm ci
      # Library first — Forge consumes it via the caelum → ./dist/caelum path map.
      - name: Build library
        run: npm run build:lib
      - name: Build Forge (production, Pages base-href)
        run: npx ng build forge --base-href /caelum/
      - name: SPA fallback (404.html)
        run: cp dist/forge/browser/index.html dist/forge/browser/404.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/forge/browser
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
